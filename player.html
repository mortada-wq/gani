<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>غن - المشغل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app screen-page">
      <header class="page-header page-header-links">
        <img class="logo logo-header" src="assets/logo.svg" alt="شعار غن" />
        <nav class="top-nav" aria-label="روابط الصفحات">
          <a href="index.html">الرئيسية</a>
          <a href="chat.html">المحادثة</a>
          <a href="player.html" class="is-active">المشغل</a>
          <a href="library.html">المكتبة</a>
          <a href="settings.html">الإعدادات</a>
        </nav>
      </header>

      <section>
        <h1 class="section-title">المشغل</h1>
        <section class="player-center">
          <div class="album-frame">مساحة الغلاف</div>
          <h2 class="subtitle">رحلة شرقية</h2>

          <div class="progress-track" aria-label="شريط التقدم">
            <span class="progress-fill"></span>
          </div>

          <div class="transport-controls">
            <button class="icon-btn transport-btn" type="button" aria-label="المسار السابق">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 6 5 12l6 6M19 6l-6 6 6 6" />
              </svg>
            </button>
            <button class="icon-btn transport-btn play-btn" type="button" aria-label="تشغيل">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 6 9 6-9 6z" />
              </svg>
            </button>
            <button class="icon-btn transport-btn" type="button" aria-label="المسار التالي">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m13 6 6 6-6 6M5 6l6 6-6 6" />
              </svg>
            </button>
          </div>

          <div class="inline-actions centered-actions">
            <button class="text-btn text-btn-small" type="button">تكرار</button>
            <button class="text-btn text-btn-small" type="button">السرعة</button>
            <button class="text-btn text-btn-small" type="button">مشاركة</button>
            <button class="text-btn text-btn-small" type="button">حفظ</button>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
