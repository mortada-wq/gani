<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>غن - المكتبة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="screen library-screen" aria-label="المكتبة">
        <header class="page-header page-header-links">
          <img class="logo logo-header" src="assets/logo.svg" alt="شعار غن" />
          <nav class="top-nav" aria-label="روابط الصفحات">
            <a href="index.html">الرئيسية</a>
            <a href="chat.html">المحادثة</a>
            <a href="player.html">المشغل</a>
            <a href="library.html" class="is-active" aria-current="page">المكتبة</a>
            <a href="settings.html">الإعدادات</a>
          </nav>
        </header>

        <h2 class="section-title">مكتبتي</h2>

        <div class="filters" role="tablist" aria-label="فلاتر المكتبة">
          <button class="filter-btn is-active" type="button" role="tab" aria-selected="true">
            الكل
          </button>
          <button class="filter-btn" type="button" role="tab" aria-selected="false">
            التقليدية
          </button>
          <button class="filter-btn" type="button" role="tab" aria-selected="false">
            المعاصرة
          </button>
        </div>

        <div class="library-grid">
          <article class="library-card">
            <h3 class="library-title">موشح الأندلس</h3>
            <p class="track-meta">تقليدي • ٣:٠٤</p>
          </article>
          <article class="library-card">
            <h3 class="library-title">وتر الليل</h3>
            <p class="track-meta">معاصر • ٢:٥٨</p>
          </article>
          <article class="library-card">
            <h3 class="library-title">أثر الناي</h3>
            <p class="track-meta">تقليدي • ٤:١١</p>
          </article>
          <article class="library-card">
            <h3 class="library-title">إيقاع المدينة</h3>
            <p class="track-meta">معاصر • ٣:٣٣</p>
          </article>
          <article class="library-card">
            <h3 class="library-title">مقام الفجر</h3>
            <p class="track-meta">تقليدي • ٢:٤٤</p>
          </article>
          <article class="library-card">
            <h3 class="library-title">ظل العود</h3>
            <p class="track-meta">مزيج • ٣:١٩</p>
          </article>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
