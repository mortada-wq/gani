<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>غن | الصفحة الرئيسية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="landing-page">
    <main class="page page-landing">
      <img class="logo logo-landing" src="assets/logo.svg" alt="شعار غن" />

      <h1 class="hero-title">غن</h1>
      <p class="hero-subtitle">
        أول تطبيق لتوليد الموسيقى
        <br />
        العربية بالذكاء
      </p>

      <form class="prompt-wrap prompt-wrap-hero" action="#" method="post" data-prompt-form>
        <label class="sr-only" for="landingPrompt">وصف الموسيقى</label>
        <div class="prompt-pill">
          <input
            id="landingPrompt"
            class="prompt-input"
            type="text"
            placeholder="صف الموسيقى التي تريد..."
            dir="rtl"
          />
        </div>
      </form>

      <div class="landing-actions">
        <button class="icon-button" type="button" aria-label="تسجيل صوتي">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 3a3 3 0 0 1 3 3v6a3 3 0 1 1-6 0V6a3 3 0 0 1 3-3Zm6 9a6 6 0 0 1-12 0M12 18v3M9 21h6"
            />
          </svg>
        </button>
        <button class="text-button" type="submit">إنشاء</button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
