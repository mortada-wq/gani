<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>غن - الإعدادات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <img class="logo logo-small" src="assets/logo.svg" alt="شعار غن" />
        <nav class="top-nav" aria-label="التنقل">
          <a class="nav-link" href="index.html">الرئيسية</a>
          <a class="nav-link" href="chat.html">المحادثة</a>
          <a class="nav-link" href="player.html">المشغل</a>
          <a class="nav-link" href="library.html">المكتبة</a>
          <a class="nav-link is-active" href="settings.html" aria-current="page">الإعدادات</a>
        </nav>
      </header>

      <main class="screen-content settings-page">
        <h1 class="section-title">الإعدادات</h1>

        <section class="settings-group">
          <h2 class="settings-subtitle">النمط الموسيقي</h2>
          <label class="choice radio-choice">
            <input type="radio" name="style" />
            <span>تقليدي</span>
          </label>
          <label class="choice radio-choice">
            <input type="radio" name="style" checked />
            <span>معاصر</span>
          </label>
          <label class="choice radio-choice">
            <input type="radio" name="style" />
            <span>مزيج</span>
          </label>
        </section>

        <hr class="divider" />

        <section class="settings-group">
          <h2 class="settings-subtitle">الآلات</h2>
          <label class="choice checkbox-choice">
            <input type="checkbox" />
            <span>عود</span>
          </label>
          <label class="choice checkbox-choice">
            <input type="checkbox" checked />
            <span>قانون</span>
          </label>
          <label class="choice checkbox-choice">
            <input type="checkbox" />
            <span>ناي</span>
          </label>
        </section>

        <button class="text-button bordered-btn" type="button">حفظ</button>
      </main>
    </div>
  </body>
</html>
